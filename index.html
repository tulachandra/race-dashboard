<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPEX + NUTANIX Registration Race</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --orange:#e85c2d;
  --bg:#0b0b0e;
  --card:#17171d;
  --card2:#22232c;
  --text:#f4f4f5;
  --muted:#9ca3af;
  --border:rgba(255,255,255,.12);
}

body{
  font-family:Barlow,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:24px;
}

.wrapper{max-width:1150px;margin:auto}

.header{
  display:flex;
  justify-content:space-between;
  gap:20px;
  align-items:flex-end;
  border-bottom:1px solid var(--border);
  padding-bottom:18px;
  margin-bottom:20px;
}

.eyebrow{
  color:var(--orange);
  text-transform:uppercase;
  letter-spacing:3px;
  font-size:12px;
  margin-bottom:6px;
}

h1{
  font-family:"Barlow Condensed",sans-serif;
  font-size:42px;
  line-height:.95;
  text-transform:uppercase;
}

h1 span{color:var(--orange)}

.meta{
  text-align:right;
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
}

.layout{
  display:grid;
  grid-template-columns:1fr 310px;
  gap:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  margin-bottom:18px;
}

.card-title{
  font-family:"Barlow Condensed",sans-serif;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--muted);
  font-size:14px;
  margin-bottom:16px;
}

.race-board{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.lane{
  display:grid;
  grid-template-columns:95px 1fr 145px;
  align-items:center;
  gap:12px;
}

.driver-label{
  display:flex;
  align-items:center;
  gap:9px;
  font-weight:700;
  font-size:15px;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
}

.track-area{
  position:relative;
  height:70px;
  border-radius:18px;
  background:linear-gradient(90deg,#24252e,#30313c);
  border:1px solid rgba(255,255,255,.14);
  overflow:hidden;
}

.track-area::before{
  content:"";
  position:absolute;
  left:24px;
  right:55px;
  top:34px;
  height:2px;
  background:repeating-linear-gradient(
    90deg,
    rgba(255,255,255,.38) 0 18px,
    transparent 18px 34px
  );
}

.finish{
  position:absolute;
  right:22px;
  top:8px;
  width:16px;
  height:54px;
  background:
    linear-gradient(45deg,#fff 25%,#111 25%,#111 50%,#fff 50%,#fff 75%,#111 75%);
  background-size:16px 16px;
}

.car{
  position:absolute;
  top:21px;
  left:18px;
  width:58px;
  height:30px;
  transition:left .7s cubic-bezier(.2,.8,.2,1);
}

.car-body{
  position:absolute;
  left:4px;
  top:8px;
  width:44px;
  height:15px;
  border-radius:8px 11px 9px 9px;
  background:currentColor;
  box-shadow:0 0 16px currentColor;
}

.car-top{
  position:absolute;
  left:18px;
  top:2px;
  width:19px;
  height:13px;
  border-radius:8px 8px 3px 3px;
  background:rgba(255,255,255,.34);
}

.car-nose{
  position:absolute;
  left:46px;
  top:11px;
  width:10px;
  height:8px;
  border-radius:0 7px 7px 0;
  background:currentColor;
}

.wheel{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  background:#050505;
  border:2px solid #777;
  bottom:0;
}

.w1{left:12px}
.w2{left:38px}

.lane-actions{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.lap-badge{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  color:var(--muted);
  text-align:center;
}

.reset-btn{
  background:rgba(255,255,255,.08);
  color:white;
  border:1px solid rgba(255,255,255,.14);
  border-radius:9px;
  padding:7px 10px;
  font-size:12px;
  cursor:pointer;
}

.reset-btn:hover{background:#e85c2d}

select,button{
  width:100%;
  border-radius:12px;
  border:1px solid var(--border);
  padding:12px;
  font-family:Barlow,sans-serif;
  font-size:15px;
}

select{
  background:var(--card2);
  color:var(--text);
  margin-bottom:12px;
}

.main-btn{
  background:var(--orange);
  color:white;
  font-family:"Barlow Condensed",sans-serif;
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:900;
  cursor:pointer;
}

.main-btn:hover{filter:brightness(1.08)}

.alert{
  display:none;
  color:#3ecf8e;
  background:rgba(62,207,142,.1);
  border:1px solid rgba(62,207,142,.35);
  border-radius:12px;
  padding:10px 12px;
  margin-bottom:12px;
  font-size:13px;
}

.lb-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:11px 13px;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:9px;
}

.lb-left{
  display:flex;
  align-items:center;
  gap:9px;
}

.lb-pos{
  color:var(--muted);
  font-size:12px;
  width:28px;
}

.lb-count{
  font-family:"Barlow Condensed",sans-serif;
  font-size:28px;
  font-weight:900;
}

@media(max-width:760px){
  body{padding:14px}
  .layout{grid-template-columns:1fr}
  .header{flex-direction:column;align-items:flex-start}
  .meta{text-align:left}
  h1{font-size:34px}
  .lane{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="header">
    <div>
      <div class="eyebrow">🏁 Live Registration Race</div>
      <h1>IMPEX + NUTANIX<br><span>Infrastructure Strategy</span></h1>
    </div>

    <div class="meta">
      🏛 Petersen Automotive Museum<br>
      📅 May 28th, 2026
    </div>
  </div>

  <div class="layout">

    <div>
      <div class="card">
        <div class="card-title">🏎 Live Race Track</div>
        <div class="race-board" id="raceBoard"></div>
      </div>
    </div>

    <div>

      <div class="card">
        <div class="card-title">➕ Add Registration</div>
        <div id="alert" class="alert"></div>

        <select id="ownerSelect">
          <option value="jay">Jay</option>
          <option value="al">Al</option>
          <option value="hamun">Hamun</option>
          <option value="sourabh">Sourabh</option>
          <option value="art">Art</option>
          <option value="rajiv">Rajiv</option>
        </select>

        <button class="main-btn" onclick="addReg()">🏁 Move Car +1</button>
      </div>

      <div class="card">
        <div class="card-title">🏆 Live Podium</div>
        <div id="leaderboard"></div>
      </div>

    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  update,
  onValue,
  get
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBm9ewdF2vuGD-UqZ6x7ULtnIzsicTlbik",
  authDomain: "race-dashboard.firebaseapp.com",
  databaseURL: "https://race-dashboard-default-rtdb.firebaseio.com",
  projectId: "race-dashboard",
  storageBucket: "race-dashboard.firebasestorage.app",
  messagingSenderId: "118996588948",
  appId: "1:118996588948:web:14f50700e2405ec97ed781",
  measurementId: "G-F3J406MEG6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const scoreRef = ref(db,"scores");

var COLORS={
  jay:"#e85c2d",
  al:"#3b9eff",
  hamun:"#3ecf8e",
  sourabh:"#c084fc",
  art:"#fbbf24",
  rajiv:"#ef4444"
};

var NAMES={
  jay:"Jay",
  al:"Al",
  hamun:"Hamun",
  sourabh:"Sourabh",
  art:"Art",
  rajiv:"Rajiv"
};

var ORDER=["jay","al","hamun","sourabh","art","rajiv"];

var scores={
  jay:0,
  al:0,
  hamun:0,
  sourabh:0,
  art:0,
  rajiv:0
};

function cleanScores(data){
  return {
    jay:data?.jay || 0,
    al:data?.al || 0,
    hamun:data?.hamun || 0,
    sourabh:data?.sourabh || 0,
    art:data?.art || 0,
    rajiv:data?.rajiv || 0
  };
}

async function initData(){
  const snap = await get(scoreRef);

  if(!snap.exists()){
    await set(scoreRef,scores);
  } else {
    const current = cleanScores(snap.val());
    await update(scoreRef,current);
  }
}

function renderTracks(){
  var board=document.getElementById("raceBoard");
  board.innerHTML="";

  ORDER.forEach(function(id){
    var lane=document.createElement("div");
    lane.className="lane";

    var move=Math.min(scores[id]*8,78);

    lane.innerHTML=
      '<div class="driver-label">'+
        '<span class="dot" style="background:'+COLORS[id]+'"></span>'+
        '<span>'+NAMES[id]+'</span>'+
      '</div>'+

      '<div class="track-area">'+
        '<div class="finish"></div>'+

        '<div class="car" style="left:calc(18px + '+move+'%); color:'+COLORS[id]+'">'+
          '<div class="car-body"></div>'+
          '<div class="car-top"></div>'+
          '<div class="car-nose"></div>'+
          '<div class="wheel w1"></div>'+
          '<div class="wheel w2"></div>'+
        '</div>'+
      '</div>'+

      '<div class="lane-actions">'+
        '<div class="lap-badge">'+scores[id]+' registrations</div>'+
        '<button class="reset-btn" onclick="resetDriver(\''+id+'\')">Reset '+NAMES[id]+'</button>'+
      '</div>';

    board.appendChild(lane);
  });
}

function renderLeaderboard(){
  var el=document.getElementById("leaderboard");
  var sorted=ORDER.slice().sort(function(a,b){
    return scores[b]-scores[a];
  });

  var pos=["1st","2nd","3rd","4th","5th","6th"];

  el.innerHTML="";

  sorted.forEach(function(id,i){
    var row=document.createElement("div");
    row.className="lb-row";

    row.innerHTML=
      '<div class="lb-left">'+
        '<span class="lb-pos">'+pos[i]+'</span>'+
        '<span class="dot" style="background:'+COLORS[id]+'"></span>'+
        '<strong>'+NAMES[id]+'</strong>'+
      '</div>'+

      '<div class="lb-count" style="color:'+COLORS[id]+'">'+scores[id]+'</div>';

    el.appendChild(row);
  });
}

function showAlert(message){
  var alert=document.getElementById("alert");
  alert.innerHTML="🏁 "+message;
  alert.style.display="block";

  setTimeout(function(){
    alert.style.display="none";
  },3000);
}

window.addReg = async function(){
  var owner=document.getElementById("ownerSelect").value;
  var newScore=(scores[owner] || 0)+1;

  await update(scoreRef,{
    [owner]:newScore
  });

  showAlert(NAMES[owner]+" moved forward!");
};

window.resetDriver = async function(id){
  await update(scoreRef,{
    [id]:0
  });

  showAlert(NAMES[id]+" reset.");
};

renderTracks();
renderLeaderboard();

initData();

onValue(scoreRef,function(snapshot){
  scores=cleanScores(snapshot.val());
  renderTracks();
  renderLeaderboard();
});

</script>

</body>
</html>
