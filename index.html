<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBm9ewdF2vuGD-UqZ6x7ULtnIzsicTlbik",
  authDomain: "race-dashboard.firebaseapp.com",
  databaseURL: "https://race-dashboard-default-rtdb.firebaseio.com",
  projectId: "race-dashboard",
  storageBucket: "race-dashboard.firebasestorage.app",
  messagingSenderId: "118996588948",
  appId: "1:118996588948:web:14f50700e2405ec97ed781",
  measurementId: "G-F3J406MEG6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const scoreRef = ref(db, "scores");

var COLORS={
  jay:"#e85c2d",
  al:"#3b9eff",
  hamun:"#3ecf8e",
  sourabh:"#c084fc",
  art:"#fbbf24"
};

var NAMES={
  jay:"Jay",
  al:"Al",
  hamun:"Hamun",
  sourabh:"Sourabh",
  art:"Art"
};

var ORDER=["jay","al","hamun","sourabh","art"];

var scores={
  jay:0,
  al:0,
  hamun:0,
  sourabh:0,
  art:0
};

async function initData(){
  const snap = await get(scoreRef);
  if(!snap.exists()){
    await set(scoreRef, scores);
  }
}

initData();

onValue(scoreRef, function(snapshot){
  if(snapshot.exists()){
    scores = snapshot.val();
    renderTracks();
    renderLeaderboard();
  }
});

function renderTracks(){
  var board=document.getElementById("raceBoard");
  board.innerHTML="";

  ORDER.forEach(function(id){
    var lane=document.createElement("div");
    lane.className="lane";

    var move=Math.min(scores[id]*8,78);

    lane.innerHTML=
      '<div class="driver-label">'+
        '<span class="dot" style="background:'+COLORS[id]+'"></span>'+
        '<span>'+NAMES[id]+'</span>'+
      '</div>'+

      '<div class="track-area">'+
        '<div class="finish"></div>'+
        '<div class="car" style="color:'+COLORS[id]+'; left:calc(18px + '+move+'%)">'+
          '<div class="car-body"></div>'+
          '<div class="car-top"></div>'+
          '<div class="car-nose"></div>'+
          '<div class="wheel w1"></div>'+
          '<div class="wheel w2"></div>'+
        '</div>'+
      '</div>'+

      '<div class="lane-actions">'+
        '<div class="lap-badge">'+scores[id]+' registrations</div>'+
        '<button class="reset-btn" onclick="resetDriver(\''+id+'\')">Reset '+NAMES[id]+'</button>'+
      '</div>';

    board.appendChild(lane);
  });
}

function renderLeaderboard(){
  var el=document.getElementById("leaderboard");
  var sorted=ORDER.slice().sort(function(a,b){return scores[b]-scores[a]});
  var pos=["1st","2nd","3rd","4th","5th"];

  el.innerHTML="";

  sorted.forEach(function(id,i){
    var row=document.createElement("div");
    row.className="lb-row";

    row.innerHTML=
      '<div class="lb-left">'+
        '<span class="lb-pos">'+pos[i]+'</span>'+
        '<span class="dot" style="background:'+COLORS[id]+'"></span>'+
        '<strong>'+NAMES[id]+'</strong>'+
      '</div>'+
      '<div class="lb-count" style="color:'+COLORS[id]+'">'+scores[id]+'</div>';

    el.appendChild(row);
  });
}

function showAlert(message){
  var alert=document.getElementById("alert");
  alert.innerHTML="🏁 "+message;
  alert.style.display="block";

  setTimeout(function(){
    alert.style.display="none";
  },3500);
}

window.addReg = async function(){
  var owner=document.getElementById("ownerSelect").value;
  var newScore = (scores[owner] || 0) + 1;

  await update(scoreRef, {
    [owner]: newScore
  });

  showAlert(NAMES[owner]+" moved forward. Total: "+newScore+" registrations.");
};

window.resetDriver = async function(id){
  await update(scoreRef, {
    [id]: 0
  });

  showAlert(NAMES[id]+" has been reset.");
};
</script>
